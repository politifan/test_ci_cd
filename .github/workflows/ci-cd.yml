name: CI/CD

on:
  push:
    branches:
      - "**"
  pull_request:

env:
  PYTHON_VERSION: "3.12"
  SERVER_HOST: "85.137.91.188"
  SERVER_USER: "root"

jobs:
  test:
    name: Tests and dependency checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -r requirements-dev.txt

      - name: Check dependency compatibility
        run: python -m pip check

      - name: Audit runtime dependencies
        run: python -m pip_audit -r requirements.txt

      - name: Run tests
        run: python -m pytest tests/

  deploy:
    name: Deploy
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          if [ -z "${SSH_PRIVATE_KEY}" ]; then
            echo "::error::Repository secret SSH_PRIVATE_KEY is required for deployment."
            exit 1
          fi
          mkdir -p ~/.ssh
          printf '%s\n' "${SSH_PRIVATE_KEY}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${SERVER_HOST}" >> ~/.ssh/known_hosts

      - name: Deploy to server
        env:
          DEPLOY_ENV: ${{ github.ref_name == 'main' && 'prod' || 'dev' }}
          DEPLOY_BRANCH: ${{ github.ref_name }}
          REPO_URL: https://github.com/${{ github.repository }}.git
          GITHUB_SHA: ${{ github.sha }}
        run: |
          scp -i ~/.ssh/deploy_key scripts/deploy.sh "${SERVER_USER}@${SERVER_HOST}:/tmp/test-ci-cd-deploy.sh"
          ssh -i ~/.ssh/deploy_key "${SERVER_USER}@${SERVER_HOST}" \
            "chmod +x /tmp/test-ci-cd-deploy.sh && REPO_URL='${REPO_URL}' GITHUB_SHA='${GITHUB_SHA}' /tmp/test-ci-cd-deploy.sh '${DEPLOY_ENV}' '${DEPLOY_BRANCH}'"
